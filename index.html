<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Produksi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Menu Utama</h1>
    <div id="nav">
        <button onclick="loadMenu('master')">Master Data</button>
        <button onclick="loadMenu('produksi')">Input Produksi</button>
        <button onclick="loadMenu('wip')">WIP Monitoring</button>
        <button onclick="loadMenu('stok')">Data Stok</button>
    </div>

    <div id="content" style="margin-top: 20px; padding: 15px; border: 1px solid #ccc;">
        Pilih menu di atas untuk memulai.
    </div>

    <script>
        // ISI DENGAN DATA DARI SETTINGS API
        const supabaseUrl = 'https://dgtusdefxvvrrefkpfwp.supabase.co/rest/v1/';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRndHVzZGVmeHZ2cnJlZmtwZndwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTY4NzUsImV4cCI6MjA5NTY3Mjg3NX0.wuiBY5UpyHJO_J9j1C6CHh5tcgg6xk6Z2BG6I3ppDog';
        const supabase = supabaseClient.createClient(supabaseUrl, supabaseKey);

        function loadMenu(menu) {
            const content = document.getElementById('content');
            if (menu === 'produksi') {
                content.innerHTML = `
                    <h3>Input Produksi</h3>
                    <input type="number" id="qty" placeholder="Jumlah">
                    <button onclick="simpanProduksi()">Simpan</button>
                `;
            } else {
                content.innerHTML = `<h3>Menu ${menu} sedang dikembangkan...</h3>`;
            }
        }

        async function simpanProduksi() {
            const qty = document.getElementById('qty').value;
            // Contoh kirim ke Supabase
            const { data, error } = await supabase
                .from('production_logs')
                .insert([{ quantity: qty, status: 'WIP' }]);
            
            if (error) alert("Gagal: " + error.message);
            else alert("Berhasil disimpan!");
        <div id="content">
    <h2>Monitoring Data</h2>
    <div id="dashboard-data" style="display: flex; gap: 10px;">
        <div style="border:1px solid #ddd; padding:10px; width:50%;">
            <h4>WIP (Proses)</h4>
            <ul id="wip-list"></ul>
        </div>
        <div style="border:1px solid #ddd; padding:10px; width:50%;">
            <h4>Stok Barang</h4>
            <ul id="stok-list"></ul>
        </div>
    </div>
</div>

<script>
    // Fungsi untuk menarik data dari Supabase
    async function loadDashboard() {
        // Ambil data WIP
        const { data: wip } = await supabase.from('production_logs').select('*').eq('status', 'WIP');
        document.getElementById('wip-list').innerHTML = wip.map(item => `<li>Item ID ${item.item_id}: ${item.quantity}</li>`).join('');

        // Ambil data Stok
        const { data: stok } = await supabase.from('stock').select('*');
        document.getElementById('stok-list').innerHTML = stok.map(item => `<li>Item ID ${item.item_id}: ${item.total_qty} pcs</li>`).join('');
    }
    
    // Jalankan saat halaman dimuat
    loadDashboard();
</script>

</body>
</html>
