<!DOCTYPE html>
<html lang="id">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --cord-pink: #d8a7b1; --bg: #f8f1f1; --text: #5c4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .page { display: none; } .active { display: block; }
        button { background: var(--cord-pink); border: none; padding: 10px 15px; border-radius: 8px; color: white; margin: 5px 0; }
        .card { background: white; padding: 15px; border-radius: 12px; border-left: 5px solid var(--cord-pink); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <nav>
        <button onclick="show('master')">Master</button>
        <button onclick="show('input')">Input</button>
        <button onclick="show('wip')">WIP</button>
    </nav>

    <div id="master" class="page active">
        <h3>Master Item</h3>
        <input id="m_item" placeholder="Nama Item Baru">
        <button onclick="addMaster()">Tambah</button>
        <div id="master-list"></div>
    </div>

    <div id="input" class="page">
        <h3>Input Produksi</h3>
        <select id="p_item"></select>
        <input id="p_qty" type="number" placeholder="Jumlah">
        <button onclick="startProduction()">Mulai Produksi</button>
    </div>

    <div id="wip" class="page">
        <h3>Laporan WIP</h3>
        <button onclick="exportWIP()">Download Excel (CSV)</button>
        <div id="wip-list"></div>
    </div>

    <script>
        const supabase = supabaseClient.createClient('https://dgtusdefxvvrrefkpfwp.supabase.co/rest/v1/', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRndHVzZGVmeHZ2cnJlZmtwZndwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTY4NzUsImV4cCI6MjA5NTY3Mjg3NX0.wuiBY5UpyHJO_J9j1C6CHh5tcgg6xk6Z2BG6I3ppDog');

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function addMaster() {
            const val = document.getElementById('m_item').value;
            await supabase.from('items').insert([{ nama_item: val }]);
            alert("Item ditambah!"); location.reload();
        }

        async function startProduction() {
            const item = document.getElementById('p_item').value;
            const qty = document.getElementById('p_qty').value;
            await supabase.from('production_logs').insert([{ item_id: item, quantity: qty, status: 'WIP' }]);
            alert("Masuk WIP!");
        }

        // --- FUNGSI OTOMATISASI (PRO-LEVEL) ---
        async function finishWIP(id, item_name, qty) {
            // 1. Tambah ke stok (atau update)
            const { data: existing } = await supabase.from('stock').select('*').eq('item_id', item_name).single();
            if(existing) {
                await supabase.from('stock').update({ total_qty: existing.total_qty + parseInt(qty) }).eq('item_id', item_name);
            } else {
                await supabase.from('stock').insert([{ item_id: item_name, total_qty: qty }]);
            }
            // 2. Hapus dari WIP
            await supabase.from('production_logs').delete().eq('id', id);
            alert("Produksi Selesai & Stok Terupdate!"); location.reload();
        }

        // --- EXPORT KE EXCEL ---
        async function exportWIP() {
            const { data } = await supabase.from('production_logs').select('*');
            let csv = "ID,Item,Qty,Status\n";
            data.forEach(d => csv += `${d.id},${d.item_id},${d.quantity},${d.status}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'Laporan_WIP.csv'; a.click();
        }

        async function loadData() {
            // Load Items untuk dropdown
            const { data: items } = await supabase.from('items').select('*');
            document.getElementById('p_item').innerHTML = items.map(i => `<option value="${i.nama_item}">${i.nama_item}</option>`).join('');
            
            // Load WIP List
            const { data: wips } = await supabase.from('production_logs').select('*');
            document.getElementById('wip-list').innerHTML = wips.map(w => `
                <div class="card">${w.item_id} (${w.quantity}) 
                <button onclick="finishWIP(${w.id}, '${w.item_id}', ${w.quantity})">Selesaikan</button></div>`).join('');
        }
        loadData();
    </script>
</body>
</html>
